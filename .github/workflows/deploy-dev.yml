name: Deploy Dev ECS Services

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: microservices-platform-dev-cluster
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: frontend
            app_path: app/frontend
            ecr_repo: microservices-platform-frontend
          - name: sales
            app_path: app/sales
            ecr_repo: microservices-platform-sales
          - name: support
            app_path: app/support
            ecr_repo: microservices-platform-support

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service.ecr_repo }}:${{ env.IMAGE_TAG }} ${{ matrix.service.app_path }}

      - name: Tag Docker image
        run: |
          docker tag ${{ matrix.service.ecr_repo }}:${{ env.IMAGE_TAG }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.service.ecr_repo }}:${{ env.IMAGE_TAG }}

      - name: Push Docker image to ECR
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.service.ecr_repo }}:${{ env.IMAGE_TAG }}

  redeploy:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Force ECS deployments
        run: |
          aws ecs update-service --cluster microservices-platform-dev-cluster --service microservices-platform-dev-frontend-service --force-new-deployment
          aws ecs update-service --cluster microservices-platform-dev-cluster --service microservices-platform-dev-sales-service --force-new-deployment
          aws ecs update-service --cluster microservices-platform-dev-cluster --service microservices-platform-dev-support-service --force-new-deployment